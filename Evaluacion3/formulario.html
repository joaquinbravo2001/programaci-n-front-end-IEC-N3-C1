<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Nuevo Usuario</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

  <!-- ===== NAVEGACIÓN (misma en index.html y formulario.html) ===== -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">TeleMed App</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
          <li class="nav-item"><a class="nav-link active" href="formulario.html">Nuevo Usuario</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <!-- ===== FIN NAVEGACIÓN ===== -->

  <div class="container mt-4" style="max-width:600px">
    <h2 class="mb-3">Registrar Nuevo Usuario</h2>

    <form id="formUsuario" novalidate>

      <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" class="form-control" id="nombre">
        <div class="invalid-feedback">El nombre es obligatorio.</div>
      </div>

      <div class="mb-3">
        <label for="usuario" class="form-label">Usuario</label>
        <input type="text" class="form-control" id="usuario">
        <div class="invalid-feedback">El usuario es obligatorio.</div>
      </div>

      <div class="mb-3">
        <label for="fechaIngreso" class="form-label">Fecha Ingreso</label>
        <input type="date" class="form-control" id="fechaIngreso">
        <div class="invalid-feedback">Ingrese una fecha válida (dd/mm/aaaa).</div>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" placeholder="usuario@servidor.dom">
        <div class="invalid-feedback">Ingrese un correo válido, ej: usuario@servidor.dom</div>
      </div>

      <div class="mb-3">
        <label for="sitioWeb" class="form-label">Sitio Web</label>
        <input type="url" class="form-control" id="sitioWeb" placeholder="https://ejemplo.com">
        <div class="invalid-feedback">Ingrese una URL válida.</div>
      </div>

      <div class="d-flex gap-2 mt-4">
        <button type="button" class="btn btn-secondary" id="btnCancelar">Cancelar</button>
        <button type="button" class="btn btn-primary" id="btnEnviar">Enviar</button>
      </div>

    </form>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/validaciones.js"></script>
</body>
</html>
